<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voyago Travel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>Voyago</h2>

  <ul>
    <li onclick="navigate('home')">Home</li>
    <li onclick="navigate('vacation')">Vacation</li>
    <li onclick="navigate('hotels')">Hotels</li>
    <li onclick="navigate('car')">Car Rental</li>
  </ul>

  <button onclick="registerUser()">Register</button>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <h1>Start Your Journey</h1>
  <p>Discover best hotels and travel experiences</p>

  <input type="text" placeholder="Search hotels..." onkeyup="searchHotel(this.value)">
</section>

<!-- HOTEL SECTION -->
<section class="cards" id="hotels">

  <div class="card" data-name="sakura">
    <img src="images/hotel1.jpg">
    <h3>Sakura Haven</h3>
    <p>Free WiFi • Spa • 4 Beds</p>
    <h4>$180 / night</h4>
  </div>

  <div class="card" data-name="kyoto">
    <img src="images/hotel2.jpg">
    <h3>Kyoto Inn</h3>
    <p>Kitchen • 2 Beds</p>
    <h4>$66 / night</h4>
  </div>

  <div class="card" data-name="royal">
    <img src="images/hotel3.jpg">
    <h3>Royal Stay</h3>
    <p>Pool • Restaurant</p>
    <h4>$205 / night</h4>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>

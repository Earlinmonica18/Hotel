<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voyago Travel</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

/* BACKGROUND IMAGE */
body {
  background: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") no-repeat center/cover;
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  background: rgba(0,0,0,0.6);
}

nav ul {
  display: flex;
  list-style: none;
  gap: 25px;
}

nav ul li {
  cursor: pointer;
}

nav button {
  padding: 8px 15px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero input {
  padding: 10px;
  width: 260px;
  border-radius: 20px;
  border: none;
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 40px;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 15px;
  width: 250px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>Voyago</h2>

  <ul>
    <li onclick="navigate('home')">Home</li>
    <li onclick="navigate('vacation')">Vacation</li>
    <li onclick="navigate('hotels')">Hotels</li>
    <li onclick="navigate('car')">Car Rental</li>
  </ul>

  <button onclick="registerUser()">Register</button>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <h1>Start Your Journey</h1>
  <p>Discover best hotels and travel experiences</p>

  <input type="text" placeholder="Search hotels..." onkeyup="searchHotel(this.value)">
</section>

<!-- HOTEL CARDS -->
<section class="cards" id="hotels">

  <div class="card" data-name="sakura">
    <img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb">
    <h3>Sakura Haven</h3>
    <p>Free WiFi • Spa • 4 Beds</p>
    <h4>$180 / night</h4>
  </div>

  <div class="card" data-name="kyoto">
    <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">
    <h3>Kyoto Inn</h3>
    <p>Kitchen • 2 Beds</p>
    <h4>$66 / night</h4>
  </div>

  <div class="card" data-name="royal">
    <img src="https://images.unsplash.com/photo-1501117716987-c8e1ecb2101f">
    <h3>Royal Stay</h3>
    <p>Pool • Restaurant</p>
    <h4>$205 / night</h4>
  </div>

</section>

<script>
// NAVIGATION
function navigate(section) {
  if(section === "home") {
    document.getElementById("home").scrollIntoView({behavior:"smooth"});
  }
  else if(section === "hotels") {
    document.getElementById("hotels").scrollIntoView({behavior:"smooth"});
  }
  else {
    alert(section + " page coming soon!");
  }
}

// REGISTER
function registerUser() {
  let name = prompt("Enter your name:");
  if(name) {
    alert("Welcome " + name + " 🎉");
  }
}

// SEARCH
function searchHotel(value) {
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let name = card.dataset.name;
    if(name.includes(value.toLowerCase())) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}
</script>

</body>
</html>
